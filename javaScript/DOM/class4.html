<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div id="api" class="row"></div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        async function name() {
          const url = "https://jsonplaceholder.typicode.com/posts";
          try {
            const response = await fetch(url);
            const data = await response.json();
            DisplayData(data);
          } catch (error) {
            console.log(`Eroor ${error}`);
          }
        }
        name();

        function DisplayData(item) {
          const resultContainer = document.getElementById("api");

          item.map((item) => {
            const calDiv = document.createElement("div");
            calDiv.className = "col-md-4 mv-4";

            const cardDiv = document.createElement("div");
            cardDiv.className = "card";
            cardDiv.style = "width:18rem";

            const cardImg = document.createElement("img");
            cardImg.className = "card-img-top";
            cardImg.src =
              "https://em-content.zobj.net/source/google/350/smiling-face-with-sunglasses_1f60e.png";

            const cardDivInner = document.createElement("div");
            cardDivInner.className = "card-body";

            const cardTitle = document.createElement("h5");
            cardTitle.className = "card-title";
            cardTitle.textContent = item.title;

            const cardDes = document.createElement("p");
            cardDes.className = "card-text";
            cardDes.textContent = item.body;

            const cardLink = document.createElement("a");
            cardLink.className = "btn btn-primary";
            cardLink.href = "";
            cardLink.textContent = "Click Here";

            resultContainer.appendChild(calDiv);
            calDiv.appendChild(cardDiv);
            cardDiv.appendChild(cardImg);
            cardDiv.appendChild(cardDivInner);
            cardDivInner.appendChild(cardTitle);
            cardDivInner.appendChild(cardDes);
            cardDivInner.appendChild(cardLink);
          });
        }
        DisplayData();
      });
    </script>
  </body>
</html>
