<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Clock</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .main {
        background-color: purple;
        width: 200px;
        height: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 10px;
        box-shadow: 0px 0px 5px 5px gray;
      }
      h2 {
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <h2 id="clock"></h2>
    </div>

    <script>
      setInterval(() => {
        const clock = document.getElementById("clock");
        const date = new Date();
        clock.innerHTML = date.toLocaleTimeString();
      }, 1000);
    </script>
  </body>
</html>
