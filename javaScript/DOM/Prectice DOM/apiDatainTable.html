<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>API Content in Table</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      #main {
        width: 95%;
        margin: auto;
      }
      .id {
        width: 40px;
      }
      .image {
        width: 270px;
      }
      .action {
        width: 150px;
      }
      .title {
        width: 250px;
      }
    </style>
  </head>
  <body style="background-color: #e982e7">
    <h1 style="text-align: center; margin-top: 20px">
      API Content Loader in Tabular formate
    </h1>
    <div id="main">
      <table class="table table-striped-columns">
        <thead>
          <tr class="table-primary">
            <th scope="col" class="id">ID</th>
            <th scope="col" class="image">Image</th>
            <th scope="col " class="title">Title</th>
            <th scope="col " class="body">Body</th>
            <th scope="col " class="action">Action</th>
          </tr>
        </thead>
        <tbody id="tableData">
          <tr></tr>
        </tbody>
      </table>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="apiDatainTable.js"></script>
  </body>
</html>
