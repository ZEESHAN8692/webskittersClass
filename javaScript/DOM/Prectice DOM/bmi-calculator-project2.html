<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator</title>
    <style>
      .main {
        margin: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        border: 2px dashed purple;
        width: 600px;
      }
      .btn {
        display: flex;
        justify-content: center;
      }
    </style>
  </head>
  <body style="background-color: rgb(221, 218, 218)">
    <div class="main">
      <h1>BMI Calculator</h1>
      <form action="">
        <label for="label">Height in cm</label>
        <input type="text" id="height" />
        <br /><br />
        <label for="label">Weight in KG</label>
        <input type="text" id="Weight" />
        <br /><br />
        <div class="btn"><button>Calculate</button></div>
      </form>
      <br /><br />
      <h3 id="result"></h3>
      <br />
      <h4>BMI Weaght Guide</h4>

      <p>Under Weight = 18.6</p>
      <p>Normal Range = 18.6 and 24.9</p>
      <p>OverWeight = Greater than = 24.9</p>
    </div>

    <script>
      const form = document.querySelector("form");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const height = parseInt(document.getElementById("height").value);
        const weight = parseInt(document.getElementById("Weight").value);
        const result = document.querySelector("#result");

        if (height < 0 || height === " " || isNaN(height)) {
          result.innerHTML = `Please Give Valid Hight ${height}`;
        } else if (weight < 0 || weight === " " || isNaN(weight)) {
          result.innerHTML = `Please Give Valid Weight ${weight}`;
        } else {
          result.innerHTML = `BMI : =  ${
            weight / ((height * height) / 10000).toFixed(2)
          }`;
        }
      });
    </script>
  </body>
</html>
