<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fetch API Data Using Promise</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      .main {
        width: 95%;
        margin: auto;
      }
    </style>
  </head>
  <body style="background-color: rgb(39, 98, 167)">
    <h1 class="text-center text-white">Fetch API Data Using Promise</h1>
    <div class="main">
      <table class="table table-striped-columns">
        <thead>
          <tr class="table-primary">
            <th scope="col" class="id">ID</th>
            <th scope="col" class="image">Name</th>
            <th scope="col " class="title">Email</th>
            <th scope="col " class="body">Phone Nymber</th>
            <th scope="col " class="action">website</th>
          </tr>
        </thead>
        <tbody id="tableData"></tbody>
      </table>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      function promiseAPI() {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            let response = fetch("https://jsonplaceholder.typicode.com/users")
              .then((data) => resolve(data.json()))
              .catch((error) => reject(error));
          }, 1000);
        });
      }
      promiseAPI()
        .then((data) => {
          console.log(data);
          let tableData = document.getElementById("tableData");
          data.map((item) => {
            tableData.innerHTML += `
         <tr>
            <td scope="col" class="id">${item.id}</td>
            <td scope="col" class="name">${item.name}</td>
            <td scope="col " class="email">${item.email}</td>
            <td scope="col " class="phone">${item.phone}</td>
            <td scope="col " class="website">${item.website}</td>
          </tr>


            `;
          });
        })
        .catch((error) => {
          console.log(`Error:- ${error}`);
        });
    </script>
  </body>
</html>
